<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Ensure the filename matches your actual static folder path -->
  <link rel="stylesheet" href="{{ url_for('static' ,filename='css/profile_nav.css') }}">
  <title>Street Bazaar</title>
  {% block links %}{% endblock %}
</head>
<body>
  <nav class="tux-nav">
    <ul class="tux-nav__list">
      <!-- Logo -->
      <li class="tux-nav__item tux-nav__logo">
        <img src="{{ url_for('static', filename='IMG/d2VicA.jpg') }}" alt="Logo" class="tux-nav__logo-img" />
      </li>

      <!-- Search Bar -->
      <li class="tux-nav__item tux-nav__search-wrap">
        <div class="tux-search-container">
          <input placeholder="Search" id="tux-search-input" class="tux-search-input" type="text" />
          <label class="tux-search-label" for="tux-search-input">
            <svg class="tux-search-icon" viewBox="0 0 512 512">
              <path d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"></path>
            </svg>
          </label>
        </div>
      </li>

      <!-- Spacer to push icons to the right -->
      <li class="tux-nav__item tux-nav__spacer"></li>

      <!-- Notification Bell -->
      <li class="tux-nav__item tux-nav__icon-item hide-mobile">
        <button class="tux-icon-btn" aria-label="Notifications">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0M3.124 7.5A8.969 8.969 0 0 1 5.292 3m13.416 0a8.969 8.969 0 0 1 2.168 4.5" />
          </svg>
        </button>
      </li>

      <!-- Dropdown -->
      <li class="tux-nav__item tux-nav__icon-item">
        <div class="tux-dropdown" id="tuxDropdown">
          <button class="tux-dropdown__btn" aria-label="Open menu" id="tuxDropdownBtn">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
          </button>
          <div class="tux-dropdown__menu" role="menu">
            <a href="#" class="tux-dropdown__item">History</a>
            <a href="#" class="tux-dropdown__item">Saved</a>
            <a href="#" class="tux-dropdown__item">Dashboard</a>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 4px 0;">
            <a href="#" class="tux-dropdown__item show-mobile">Notifications</a>
            <a href="#" class="tux-dropdown__item">Others</a>
          </div>
        </div>
      </li>

      <!-- Profile -->
      <li class="tux-nav__item tux-nav__icon-item">
        <button class="tux-profile-btn" aria-label="Profile">
          <img src="{{ url_for('static', filename='IMG/profileicon.jpg') }}" alt="Profile" class="tux-profile-img" />
        </button>
      </li>
    </ul>
  </nav>

  <div class="tux-main">
    {% block main_page %}{% endblock %}
  </div>

  <script>
    // Handle Dropdown on Mobile (Toggle on Click)
    const dropdownBtn = document.getElementById('tuxDropdownBtn');
    const dropdown = document.getElementById('tuxDropdown');

    dropdownBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('is-active');
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', () => {
      dropdown.classList.remove('is-active');
    });
  </script>

  {% block js_section %}{% endblock %}
</body>
</html>
