<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Improved Navbar</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/profile_section_nav.css') }}"
    />
  </head>
  <body>
    <div class="main_container">
      <button class="enter-button">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 40 27"
          class="arrow"
        >
          <line
            stroke-width="2"
            stroke="white"
            y2="14"
            x2="40"
            y1="14"
            x1="1"
          ></line>
          <line
            stroke-width="2"
            stroke="white"
            y2="1.41537"
            x2="10.4324"
            y1="14.2433"
            x1="1.18869"
          ></line>
          <line
            stroke-width="2"
            stroke="white"
            y2="13.6007"
            x2="1.20055"
            y1="26.2411"
            x1="10.699"
          ></line>
          <line
            stroke="white"
            y2="14.3133"
            x2="1.07325"
            y1="13.6334"
            x1="0.33996"
          ></line>
          <line
            stroke-width="2"
            stroke="white"
            y2="13"
            x2="39"
            y1="8"
            x1="39"
          ></line>
        </svg>
      </button>

      <button class="tab tab--1 tab_label">
        <a class="navbar_anchor" href="{{ url_for('profile_name') }}">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-5.5-2.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0ZM10 12a5.99 5.99 0 0 0-4.793 2.39A6.483 6.483 0 0 0 10 16.5a6.483 6.483 0 0 0 4.793-2.11A5.99 5.99 0 0 0 10 12Z"
              clip-rule="evenodd"
            />
          </svg>
          <span>Profile</span>
        </a>
      </button>

      <button class="tab tab--2 tab_label">
        <a class="navbar_anchor" href="{{ url_for('profile_shop') }}">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              d="M2.879 7.121A3 3 0 0 0 7.5 6.66a2.997 2.997 0 0 0 2.5 1.34 2.997 2.997 0 0 0 2.5-1.34 3 3 0 1 0 4.622-3.78l-.293-.293A2 2 0 0 0 15.415 2H4.585a2 2 0 0 0-1.414.586l-.292.292a3 3 0 0 0 0 4.243ZM3 9.032a4.507 4.507 0 0 0 4.5-.29A4.48 4.48 0 0 0 10 9.5a4.48 4.48 0 0 0 2.5-.758 4.507 4.507 0 0 0 4.5.29V16.5h.25a.75.75 0 0 1 0 1.5h-4.5a.75.75 0 0 1-.75-.75v-3.5a.75.75 0 0 0-.75-.75h-2.5a.75.75 0 0 0-.75.75v3.5a.75.75 0 0 1-.75.75h-4.5a.75.75 0 0 1 0-1.5H3V9.032Z"
            />
          </svg>
          <span>Shop</span>
        </a>
      </button>

      <button class="tab tab--3 tab_label" style="background-color: #2a84da">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 20 20"
          fill="currentColor"
        >
          <path
            fill-rule="evenodd"
            d="M3 3.5A1.5 1.5 0 0 1 4.5 2h6.879a1.5 1.5 0 0 1 1.06.44l4.122 4.12A1.5 1.5 0 0 1 17 7.622V16.5a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 3 16.5v-13ZM13.25 9a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0v-4.5a.75.75 0 0 1 .75-.75Zm-6.5 4a.75.75 0 0 1 .75.75v.5a.75.75 0 0 1-1.5 0v-.5a.75.75 0 0 1 .75-.75Zm4-1.25a.75.75 0 0 0-1.5 0v2.5a.75.75 0 0 0 1.5 0v-2.5Z"
            clip-rule="evenodd"
          />
        </svg>
        <span>Dashboard</span>
      </button>
    </div>
  </body>
</html>
