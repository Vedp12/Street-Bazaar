{% extends "nav.html" %} 
{% block links %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/nav.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}" />
{% endblock %} 

{% block main_page %}
<div id="main_container">
  <h1 id="heading_text">Street Bazaar</h1>

  <section class="home-section" aria-labelledby="cat-heading">
    <h2 class="section-label" id="cat-heading">Categories</h2>

    <div class="box_container_category">
      <div class="card_collector" data-href="{{ url_for('inventory') }}">
        <img
          src="{{ url_for('static', filename='IMG/inventory.png') }}"
          alt="Inventory management"
          class="home_page_image_class"
        />
        <button class="categgory_images" aria-label="Go to Inventory">
          <span class="categgory_text">Inventory</span>
        </button>
      </div>

      <div class="card_collector" data-href="#">
        <img
          src="{{ url_for('static', filename='IMG/invoice.png') }}"
          alt="Invoice management"
          class="home_page_image_class"
        />
        <button class="categgory_images" aria-label="Go to Invoice">
          <span class="categgory_text">Invoice</span>
        </button>
      </div>

      <div class="card_collector" data-href="#">
        <img
          src="{{ url_for('static', filename='IMG/marketplace.png') }}"
          alt="Marketplace"
          class="home_page_image_class"
        />
        <button class="categgory_images" aria-label="Go to Marketplace">
          <span class="categgory_text">Marketplace</span>
        </button>
      </div>
    </div>
  </section>

  <hr style="color: cadetblue; margin-bottom: 10px; opacity: 0.5;" />
  
  <section class="home-section box_container_employees" aria-labelledby="emp-heading">
    <div class="emp-header">
      <h2 class="section-label" id="emp-heading" style="margin-top: 0;">Team</h2>
      <button
        type="button"
        class="add_sign_Btn"
        id="addEmployeeBtn"
        aria-label="Add new employee"
      >
        <span class="add_profile_sign">+</span>
      </button>
    </div>
    
    <div class="profile_emp_container">
      <div class="profile_emp_card">
        <div class="card-employee" tabindex="0" role="article" aria-label="Employee: Mr Tux">
          <div class="user-picture" aria-hidden="true">
            <svg viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg">
              <path d="M224 256c70.7 0 128-57.31 128-128s-57.3-128-128-128C153.3 0 96 57.31 96 128S153.3 256 224 256zM274.7 304H173.3C77.61 304 0 381.6 0 477.3c0 19.14 15.52 34.67 34.66 34.67h378.7C432.5 512 448 496.5 448 477.3C448 381.6 370.4 304 274.7 304z" />
            </svg>
          </div>
          <p class="name-employee">Mr Tux<span>Jack of all trade</span></p>
          <button class="profile-enter-btn" aria-label="View Mr Tux profile">Enter</button>
        </div>
      </div>
      
      <div class="profile_emp_card">
        <div class="card-employee" tabindex="0" role="article" aria-label="Employee: Mr Tux">
          <div class="user-picture" aria-hidden="true">
            <svg viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg">
              <path d="M224 256c70.7 0 128-57.31 128-128s-57.3-128-128-128C153.3 0 96 57.31 96 128S153.3 256 224 256zM274.7 304H173.3C77.61 304 0 381.6 0 477.3c0 19.14 15.52 34.67 34.66 34.67h378.7C432.5 512 448 496.5 448 477.3C448 381.6 370.4 304 274.7 304z" />
            </svg>
          </div>
          <p class="name-employee">Mr Tux<span>Jack of all trade</span></p>
          <button class="profile-enter-btn" aria-label="View Mr Tux profile">Enter</button>
        </div>
      </div>
      
      <div class="profile_emp_card">
        <div class="card-employee" tabindex="0" role="article" aria-label="Employee: Mr Tux">
          <div class="user-picture" aria-hidden="true">
            <svg viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg">
              <path d="M224 256c70.7 0 128-57.31 128-128s-57.3-128-128-128C153.3 0 96 57.31 96 128S153.3 256 224 256zM274.7 304H173.3C77.61 304 0 381.6 0 477.3c0 19.14 15.52 34.67 34.66 34.67h378.7C432.5 512 448 496.5 448 477.3C448 381.6 370.4 304 274.7 304z" />
            </svg>
          </div>
          <p class="name-employee">Mr Tux<span>Jack of all trade</span></p>
          <button class="profile-enter-btn" aria-label="View Mr Tux profile">Enter</button>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
  document.querySelectorAll(".card_collector").forEach((card) => {
    const href = card.dataset.href;
    if (!href || href === "#") return;

    card.addEventListener("click", () => {
      window.location.href = href;
    });

    const btn = card.querySelector(".categgory_images");
    if (btn) {
      btn.addEventListener("click", (e) => {
        e.stopPropagation(); 
        window.location.href = href;
      });
    }
  });

  document.getElementById("addEmployeeBtn").addEventListener("click", () => {
    showToast("Opening Add Employee form…");
  });

  let _toastTimer;
  function showToast(msg, duration = 2800) {
    let t = document.getElementById("sb-toast");
    if (!t) {
      t = document.createElement("div");
      t.id = "sb-toast";
      document.body.appendChild(t);
    }
    clearTimeout(_toastTimer);
    t.textContent = msg;
    t.classList.add("show");
    _toastTimer = setTimeout(() => t.classList.remove("show"), duration);
  }

  document.querySelectorAll(".card-employee").forEach((card) => {
    card.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        card.click();
        showToast("Opening employee profile…");
      }
    });
  });
</script>
{% endblock %}
