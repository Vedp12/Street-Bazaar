<link rel="stylesheet" href="{{ url_for('static', filename='css/nav.css') }}" />
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/inventory_add_product.css') }}"
/>

<div class="add-product-card">
  <div class="form-header">
    <h2>Add new product</h2>
  </div>

  <div class="product-form">
    <form id="addProductForm" method="POST" action="">
      <div class="input-group">
        <label> Product Name <span class="required-star">*</span> </label>
        <input
          type="text"
          id="productName"
          name="product_name"
          placeholder="e.g. light, pant"
          autocomplete="off"
          required
        />
      </div>

      <div class="row-dual">
        <div class="input-group">
          <label>Price <span class="required-star">*</span></label>
          <input
            type="number"
            id="productPrice"
            name="product_price"
            placeholder="e.g. 249"
            autocomplete="off"
            required
            pattern="[0-9]+(\.[0-9]{1,2})?"
            title="Enter a valid price (e.g. 19.99 or 50)"
          />
        </div>
        <div class="input-group">
          <label> Company / Brand <span class="required-star">*</span></label>
          <input
            type="text"
            id="productCompany"
            name="product_company"
            placeholder="e.g. DailyVest"
            autocomplete="off"
            required
          />
        </div>
      </div>

      <div class="input-group">
        <label>
          Tag
          <span style="font-weight: normal"
            >(readonly - system assigned)</span
          ></label
        >
        <input
          type="text"
          id="productTag"
          name="product_tag"
          value="quick-commerce"
          readonly
          class="readonly-tag-input"
          style="
            background: #f0f9fe;
            border-color: #cde9f3;
            color: #1e5e74;
            font-weight: 500;
            cursor: default;
          "
        />
      </div>

      <button type="submit" class="save-btn" name="save_action" value="saved">
        Saved
      </button>

      <input type="hidden" name="form_submitted" value="1" />
    </form>
  </div>
</div>
