            x2="40"

          <line
            stroke-width="2.5"
            stroke="white"
            y2="1.41"
            x2="10.43"
            y1="14.24"
            x1="1.19"
          ></line>
          <line
            stroke-width="2.5"
            stroke="white"

            x2="1.2"

    <section class="section_contaiener">
      <div class="side_bar_nav">
        <div class="container">
          <div class="slider" id="imageSlider">
            <img
              src="{{ url_for('static', filename='IMG/d2VicA.jpg') }}"
              alt="Shop Front 1"
            />
            <img
              src="{{ url_for('static', filename='IMG/d2VicA.jpg') }}"
              alt="Shop Showcase 2"
            />
            <img
              src="{{ url_for('static', filename='IMG/d2VicA.jpg') }}"
              alt="Shop Showcase 3"
            />
          </div>
        </div>

        <div class="slider-dots" id="sliderDots">
          <span class="dot active" onclick="currentSlide(0)"></span>
          <span class="dot" onclick="currentSlide(1)"></span>
          <span class="dot" onclick="currentSlide(2)"></span>
        </div>

        <div class="thumbnails">
          <img
            src="{{ url_for('static', filename='IMG/d2VicA.jpg') }}"
            class="thumb-img active"
            alt="Thumb 1"
            onclick="currentSlide(0)"
          />
          <img
            src="{{ url_for('static', filename='IMG/d2VicA.jpg') }}"
            class="thumb-img"
            alt="Thumb 2"
            onclick="currentSlide(1)"
          />
          <img
            src="{{ url_for('static', filename='IMG/d2VicA.jpg') }}"
            class="thumb-img"
            alt="Thumb 3"
            onclick="currentSlide(2)"
          />
        </div>

        <div class="profile-progress">
          <h2>Profile Strength</h2>
          <div class="progress-circle" id="progressCircle">85%</div>
          <input
            type="number"
            id="progressInput"
            min="0"
            max="100"
            value="85"
            oninput="updateProgress()"

      </div>

      <div class="main_body">
        <div class="action-header">

              ></path>

        <div class="info-section">

          <div class="info-input-data">
            <span class="input-data">Full name:</span>
            <span class="User-data" id="userName">Tux</span>

            <span class="input-data">Email:</span>
            <span class="User-data" id="userEmail">tux69@gmail.com</span>

            <span class="input-data">Phone number:</span>
            <span class="User-data" id="userPhone">+91 9825848035</span>

            <span class="input-data">Age:</span>
            <span class="User-data" id="userAge">32</span>

            <span class="input-data">Shop name:</span>
            <span class="User-data" id="userShop">Food and Fibers</span>

        </div>

        <div class="info-section Maps-section">

          <div class="gmap_canvas">
            <iframe
              src="https://maps.google.com/maps?q=Indus%20University,%20Ahmedabad&t=&z=13&ie=UTF8&iwloc=&output=embed"
              loading="lazy"
              allowfullscreen
            >
            </iframe>
          </div>
          <a
            href="https://maps.google.com"
            target="_blank"
            class="gme-generated-link"
            >Open in dedicated Google Maps app</a
          >
        </div>

        <div class="info-section share-section">
          <h1>Share Profile</h1>
          <hr />
          <div class="card">
            <a
              class="socialContainer whatsapp"
              href="https://wa.me/"

                ></path>

            </a>

            <a
              class="socialContainer mail"
              href="mailto:tux69@gmail.com"
              aria-label="Send Email"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                class="socialSvg strokeIcon"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"
                />
              </svg>
            </a>

            <button
              class="socialContainer download"
              onclick="downloadProfileData()"
              aria-label="Download Backup"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                class="socialSvg strokeIcon"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"

            </button>

            <button

              onclick="copyProfileLink()"

              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2"

                />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </section>

    <div class="toast" id="globalToast">Action completed successfully!</div>

    <script>
      let currentIdx = 0;
      const slider = document.getElementById("imageSlider");
      const dots = document.querySelectorAll("#sliderDots .dot");
      const thumbs = document.querySelectorAll(".thumbnails .thumb-img");
      const totalSlides = 3;

      // Functional slide navigation logic
      function currentSlide(index) {
        currentIdx = index;
        updateSliderPosition();
      }

      function updateSliderPosition() {
        slider.style.transform = `translateX(-${currentIdx * 100}%)`;

        // Cycle states safely through class lists
        dots.forEach((dot, i) =>
          dot.classList.toggle("active", i === currentIdx),
        );
        thumbs.forEach((thumb, i) =>
          thumb.classList.toggle("active", i === currentIdx),
        );
      }

      // Auto rotation for slideshow implementation
      setInterval(() => {
        currentIdx = (currentIdx + 1) % totalSlides;
        updateSliderPosition();
      }, 5000);

      // Async CSS progress circle rendering logic
      function updateProgress() {
        const input = document.getElementById("progressInput").value;
        const circle = document.getElementById("progressCircle");
        const percent = Math.min(Math.max(input, 0), 100);
        circle.textContent = percent + "%";
        circle.style.background = `conic-gradient(#2b9781 0% ${percent}%,#cfe4f3 ${percent}% 100%)`;
      }

      function showToast(message) {
        const toast = document.getElementById("globalToast");
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
      }

      function copyProfileLink() {
        navigator.clipboard.writeText(window.location.href);
        showToast("Profile link copied to clipboard!");
      }

      function downloadProfileData() {
        showToast("Generating secure profile offline summary...");
      }

      function toggleEditMode() {
        showToast("Entering profile modification wizard...");
      }

      // Explicit initiation call
      document.addEventListener("DOMContentLoaded", updateProgress);
    </script>
  </body>
</html>
